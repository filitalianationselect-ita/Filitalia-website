<body>

<section class="event-detail-page players-page news-detail-page">

<footer>
<img src="images/logo.png" class="footer-logo" alt="FIL-ITALIA Logo">
<p data-key="footerText">© 2026 FIL-ITALIA Basketball</p>
<div class="footer-links"><a href="privacy.html">Privacy Policy</a></div>
</footer>
<script src="news-data.js?v=501"></script>
<script src="script.js?v=400"></script>
<script>
(function(){
  function txt(value){
    const L = (typeof lang === "function" ? lang() : "it");
    if(value && typeof value === "object") return value[L] || value.it || value.en || value.ph || "";
    return value == null ? "" : String(value);
  }
  function esc(value){ return String(value || "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c])); }
  function slug(value){ return String(value || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,""); }
  function richDescription(value){
    const content = txt(value).trim();
    if(!content) return "";

    // Le news nuove possono contenere HTML già pronto:
    // <p>, <strong>, <h3>, <ul>, <li>, ecc.
    const containsHtml = /<\/?(?:p|h[1-6]|ul|ol|li|strong|b|em|i|br|blockquote)\b[^>]*>/i.test(content);
    if(containsHtml) return content;

    // Compatibilità con le vecchie news salvate come semplice testo.
    return content
      .split(/\n{2,}/)
      .map(paragraph => `<p>${esc(paragraph).replace(/\n/g, "<br>")}</p>`)
      .join("");
  }
  function findNews(id){
    const list = (typeof newsData !== "undefined" && Array.isArray(newsData)) ? newsData : [];
    return list.find(n => String(n.id || n.slug || slug(txt(n.title))) === String(id || "")) || list[0];
  }
  function render(){
    const container = document.getElementById("newsDetailContainer");
    if(!container) return;
    const params = new URLSearchParams(window.location.search);
    const item = findNews(params.get("id"));
    if(!item){
      container.innerHTML = `<div class="event-detail-card"><div class="event-detail-info"><h1>News non trovata</h1></div></div>`;
      return;
    }
    const title = txt(item.title) || "FIL-ITALIA News";
    const image = item.image || "images/logo.png";
    document.title = title + " | FIL-ITALIA";
    container.innerHTML = `
      <article class="event-detail-card news-detail-card">
        <header class="event-detail-info news-detail-header">
          <span class="event-detail-badge">FIL-ITALIA NEWS</span>
          <h1>${esc(title)}</h1>
          <p class="event-detail-description news-detail-date">${esc(txt(item.date || ""))}</p>
        </header>

        <div class="event-detail-image-wrap news-detail-image-wrap">
          <img src="${esc(image)}" alt="${esc(title)}" style="object-position:${esc(item.imagePosition || 'center center')};" onerror="this.onerror=null;this.src='images/logo.png';">
        </div>

        <div class="event-detail-info news-detail-body">
          <div class="event-detail-description">${richDescription(item.description || item.excerpt || "")}</div>
          <div class="event-detail-actions">
            <button type="button" class="ticket-button event-main-action event-share-action" onclick="shareFilitalia('news', newsData.find(n => String(n.id || n.slug || '') === '${esc(item.id || item.slug || slug(txt(item.title)))}') || ${JSON.stringify(item).replace(/"/g,'&quot;')}, 'news-item.html?id=${encodeURIComponent(item.id || item.slug || slug(txt(item.title)))}')">Condividi</button>
          </div>
        </div>
      </article>`;
  }
  document.addEventListener("DOMContentLoaded", render);
})();
</script>
</body>
</html>
