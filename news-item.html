<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="News FIL-ITALIA Nation Select.">
<meta property="og:image" content="images/logo.png">
<meta property="og:title" content="FIL-ITALIA News">
<meta property="og:description" content="News FIL-ITALIA Nation Select.">
<title>FIL-ITALIA News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=400">
<link rel="icon" type="image/png" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">
<style>
/* Pagina news completa: titolo, foto e testo in una sola colonna */
.news-detail-card {
  max-width: 900px;
  margin: 0 auto 40px;
  background: #fff;
  border-radius: 34px;
  padding: 42px;
  box-shadow: 0 18px 45px rgba(0,0,0,.07);
  text-align: left;
}
.news-detail-header {
  max-width: 760px;
  margin: 0 auto 26px;
  text-align: center;
}
.news-detail-header h1 {
  font-size: 2.6rem;
  line-height: 1.12;
  margin: 0 0 12px;
}
.news-detail-date {
  color: #777;
  font-weight: 600;
  margin: 0;
}
.news-detail-image-wrap {
  max-width: 760px;
  margin: 0 auto 32px;
}
.news-detail-image-wrap img {
  display: block;
  width: 100%;
  height: auto;
  max-height: 620px;
  object-fit: contain;
  object-position: center;
  background: #f5f5f5;
  border-radius: 24px;
}
.news-detail-content {
  max-width: 760px;
  margin: 0 auto;
  color: #444;
  font-size: 1rem;
  line-height: 1.85;
}
.news-detail-content > p { margin: 0 0 1rem; }
.news-detail-content > h2,
.news-detail-content > h3 {
  margin: 2rem 0 1rem;
  line-height: 1.25;
  color: #111;
}
.news-detail-content > ul,
.news-detail-content > ol {
  margin: 0 0 1.25rem;
  padding-left: 1.5rem;
}
.news-detail-content li { margin-bottom: .45rem; }
.news-detail-actions {
  max-width: 300px;
  margin: 30px auto 0;
}
@media (max-width: 900px) {
  .news-detail-card { padding: 24px; border-radius: 26px; }
  .news-detail-header h1 { font-size: 1.85rem; }
  .news-detail-image-wrap { margin-bottom: 24px; }
}
</style>
</head>
<body>
<div class="background-logo"></div>
<nav class="navbar">
  <a href="index.html" class="logo-area">
    <img src="images/logo.png" class="nav-logo" alt="FIL-ITALIA Logo">
    <div class="logo-text">FIL-ITALIA</div>
  </a>
  <button class="mobile-menu-button" type="button" onclick="toggleMobileMenu()" aria-label="Open menu">☰</button>
  <div class="nav-links" id="navLinks">
    <a href="index.html" data-key="navHome">Home</a>
    <a href="players.html" data-key="navPlayers">Players</a>
    <a href="gallery.html" data-key="navGallery">Gallery</a>
    <a href="staff.html" data-key="navStaff">Staff</a>
    <a href="news.html" data-key="navNews">News</a>
    <a href="events.html" data-key="navEvents">Events</a>
    <a href="register.html" data-key="navJoin">Join</a>
    <a href="camp-register.html" data-key="navCamp">Camp</a>
    <a href="index.html#contact" data-key="navContact">Contact</a>
  </div>
  <div class="language-switch">
    <button onclick="changeNewsLanguage('it')">IT</button>
    <button onclick="changeNewsLanguage('en')">EN</button>
    <button onclick="changeNewsLanguage('ph')">PH</button>
  </div>
</nav>

<section class="event-detail-page players-page">
  <div class="players-button-row"><a href="news.html" id="backToNews" class="players-list-link">← Torna alle News</a></div>
  <div id="newsDetailContainer"></div>
</section>

<footer>
<img src="images/logo.png" class="footer-logo" alt="FIL-ITALIA Logo">
<p data-key="footerText">© 2026 FIL-ITALIA Basketball</p>
<div class="footer-links"><a href="privacy.html">Privacy Policy</a></div>
</footer>
<script src="news-data.js?v=501"></script>
<script src="script.js?v=402"></script>
<script>
(function(){
  function txt(value){
    const L = (typeof lang === "function" ? lang() : "it");
    if(value && typeof value === "object") return value[L] || value.it || value.en || value.ph || "";
    return value == null ? "" : String(value);
  }
  function esc(value){ return String(value || "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c])); }
  function slug(value){ return String(value || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,""); }
  function richDescription(value){
    const content = txt(value).trim();
    if(!content) return "";

    // Le news nuove possono contenere HTML già pronto:
    // <p>, <strong>, <h3>, <ul>, <li>, ecc.
    const containsHtml = /<\/?(?:p|h[1-6]|ul|ol|li|strong|b|em|i|br|blockquote)\b[^>]*>/i.test(content);
    if(containsHtml) return content;

    // Compatibilità con le vecchie news salvate come semplice testo.
    return content
      .split(/\n{2,}/)
      .map(paragraph => `<p>${esc(paragraph).replace(/\n/g, "<br>")}</p>`)
      .join("");
  }
  function findNews(id){
    const list = (typeof newsData !== "undefined" && Array.isArray(newsData)) ? newsData : [];
    const wanted = String(id || "");
    return list.find(n => {
      const candidates = [n.id, n.slug].filter(Boolean).map(String);
      if(n.title && typeof n.title === "object"){
        [n.title.it, n.title.en, n.title.ph].filter(Boolean).forEach(title => candidates.push(slug(title)));
      }else if(n.title){
        candidates.push(slug(n.title));
      }
      return candidates.includes(wanted);
    }) || list[0];
  }
  function render(){
    const container = document.getElementById("newsDetailContainer");
    if(!container) return;
    const params = new URLSearchParams(window.location.search);
    const item = findNews(params.get("id"));
    if(!item){
      container.innerHTML = `<div class="event-detail-card"><div class="event-detail-info"><h1>News non trovata</h1></div></div>`;
      return;
    }
    const title = txt(item.title) || "FIL-ITALIA News";
    const image = item.image || "images/logo.png";
    document.title = title + " | FIL-ITALIA";
    const L = (typeof lang === "function" ? lang() : "it");
    const shareLabel = L === "en" ? "Share" : L === "ph" ? "I-share" : "Condividi";
    const backLabel = L === "en" ? "← Back to News" : L === "ph" ? "← Bumalik sa News" : "← Torna alle News";
    const backLink = document.getElementById("backToNews");
    if(backLink) backLink.textContent = backLabel;

    container.innerHTML = `
      <article class="news-detail-card">
        <header class="news-detail-header">
          <span class="event-detail-badge">FIL-ITALIA NEWS</span>
          <h1>${esc(title)}</h1>
          <p class="news-detail-date">${esc(txt(item.date || ""))}</p>
        </header>
        <div class="news-detail-image-wrap">
          <img src="${esc(image)}" alt="${esc(title)}" style="object-position:${esc(item.imagePosition || 'center center')};" onerror="this.onerror=null;this.src='images/logo.png';">
        </div>
        <div class="news-detail-content">${richDescription(item.description || item.excerpt || "")}</div>
        <div class="news-detail-actions">
          <button type="button" class="ticket-button event-main-action event-share-action" onclick="shareFilitalia('news', newsData.find(n => String(n.id || n.slug || '') === '${esc(item.id || item.slug || slug(txt(item.title)))}') || ${JSON.stringify(item).replace(/"/g,'&quot;')})">${shareLabel}</button>
        </div>
      </article>`;
  }
  window.changeNewsLanguage = function(language){
    if(typeof setLanguage === "function") setLanguage(language);
    render();
  };
  document.addEventListener("DOMContentLoaded", render);
})();
</script>
</body>
</html>
